- title: ALLCAPS, transformer-based pneumococcal serotyping
  subtitle:
  group: featured
  image: images/site/photo.jpg
  link: 
  description: Alongside a talented intern, I am developing a transformer-based model for pneumococcal serotyping from genome sequence data. This model has been trained on a large dataset of pneumococcal genomes and can accurately and rapidly predict the serotype of a given genome. This work was funded by [ISPPD-14](https://isppd.kenes.com/robert-austrian-research-award/).
