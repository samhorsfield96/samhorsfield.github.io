- title: Simulation of fungal pangenomes
  subtitle:
  group: featured
  image: images/site/photo.jpg
  link: https://github.com/samhorsfield96/PansimNuc
  description: I have developed a simulation framework for eukaryotic pangenomes, PansimNuc, which models mutation, selection, gene and Transposable Element (TE) gain/loss and mobility, recombination and demography. PansimNuc generates simulated genomes that can be used to benchmark pangenome analysis tools and methods, and will be used to study the interaction of a multitude of neutral and selective forces that shape fungal pangenomes. It also comes with a suite of helper tools to analyse simulated populations.
  repo: samhorsfield96/PansimNuc
  tags:
- title: Machine-learning approaches to study fungal pangenomes
  subtitle:
  group: featured
  image: images/site/photo.jpg
  link: 
  description: I am developing machine-learning approaches to identify diversifying regions in fungal genomes that underpin pathogen adaptation. These approaches leverage the comprehensive representation of variation encoded in pangenome graphs to call mutations in core and accessory regions.
